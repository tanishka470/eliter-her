<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeNest - Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css" /></head>
<body>
  <div class="container">
    <nav class="top-nav">
      <div class="logo">
        <span class="logo-mark">SN</span>
        <span>SafeNest</span>
      </div>

      <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="map.html">Safety Map</a>
        <a href="emergency.html">Emergency</a>
        <a href="settings.html">Settings</a>
      </div>

      <div class="nav-actions">
  <button class="emergency-btn" type="button" onclick="window.location.href='tel:112'">Emergency</button>
  <button class="profile" type="button" title="Profile">&#128100;</button>
  <div class="profile-menu" id="profileMenu">
    <button id="logoutBtn">Logout</button>
  </div>
</div>

      </div>
    </nav>

    <main class="main-section">
      <section class="location-panel">
        <h1>Dashboard / Location Input</h1>
        <p>Enter your location details to continue to safety analysis.</p>

        <form class="location-form" id="locationForm" novalidate>
          <div class="field">
            <label for="state">State</label>
            <select id="state">
              <option value="">Select State</option>
              <option value="Delhi">Delhi</option>
              <option value="Maharashtra">Maharashtra</option>
              <option value="Karnataka">Karnataka</option>
              <option value="Uttar Pradesh">Uttar Pradesh</option>
              <option value="Tamil Nadu">Tamil Nadu</option>
            </select>
          </div>

          <div class="field">
            <label for="city">City</label>
            <select id="city">
              <option value="">Select City</option>
              <option value="New Delhi">New Delhi</option>
              <option value="Mumbai">Mumbai</option>
              <option value="Bengaluru">Bengaluru</option>
              <option value="Lucknow">Lucknow</option>
              <option value="Chennai">Chennai</option>
            </select>
          </div>

          <div class="field">
            <label for="area">Area / Locality</label>
            <input id="area" type="text" placeholder="e.g., Kashmere Gate" />
          </div>

          <button class="check-btn" type="submit">Check Safety</button>
        </form>

        <p class="error-msg" id="formError"></p>
      </section>

      <section class="quick-access" aria-label="Quick access">
        <button class="quick-card" type="button" id="viewSafetyMapBtn">
          <span class="icon">&#128506;</span>
          <h3>View Safety Map</h3>
          <p>See map-based safety indicators.</p>
        </button>

        <button class="quick-card" type="button" id="womenFriendlyBtn">
          <span class="icon">&#127970;</span>
          <h3>Women-Friendly Places</h3>
          <p>Find nearby trusted places.</p>
        </button>

        <button class="quick-card" type="button" id="emergencyContactsBtn">
          <span class="icon">&#128222;</span>
          <h3>Emergency Contacts</h3>
          <p>Quickly reach emergency services.</p>
        </button>

        <button class="quick-card" type="button" id="reportUnsafeBtn">
          <span class="icon">&#9888;</span>
          <h3>Report Unsafe Area</h3>
          <p>Report issues to improve safety.</p>
        </button>

        <button class="quick-card" type="button" id="liveAlertsBtn">
          <span class="icon">&#128276;</span>
          <h3>Live Alerts</h3>
          <p>Get real-time area alerts.</p>
        </button>
      </section>
    </main>
  </div>

  <script src="js/dashboard.js" defer></script>
</body>
</html>
