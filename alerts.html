<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Nest - Live Alerts</title>
  <link rel="stylesheet" href="css/alerts.css" />
</head>
<body>
  <button class="emergency-btn" type="button" id="emergencyBtn">Emergency</button>

  <header class="top-bar">
    <div class="top-left">
      <button class="back-btn" type="button" id="backBtn">Back</button>
      <div class="location-chip" id="locationDisplay">Live alerts for all locations</div>
    </div>
  </header>

  <main class="page-wrap">
    <section class="filter-card" aria-label="Filter options">
      <h1>Live Alerts</h1>
      <p class="subtext">Recent safety alerts and warnings from verified and community sources.</p>

      <div class="filters-grid">
        <div class="field">
          <label for="timeFilter">Time-based alerts</label>
          <select id="timeFilter">
            <option value="all">All time</option>
            <option value="24h">Last 24 hours</option>
            <option value="7d">Last 7 days</option>
            <option value="30d">Last 30 days</option>
          </select>
        </div>

        <div class="field">
          <label for="locationFilter">Location-based alerts</label>
          <select id="locationFilter">
            <option value="all">All locations</option>
          </select>
        </div>
      </div>

      <div class="severity-legend" aria-label="Severity legend">
        <span class="legend-item"><span class="severity-badge severity-low">Low</span>Low risk</span>
        <span class="legend-item"><span class="severity-badge severity-medium">Medium</span>Watch closely</span>
        <span class="legend-item"><span class="severity-badge severity-high">High</span>Immediate caution</span>
      </div>

      <div class="summary-row">
        <span id="resultsSummary">0 alerts</span>
        <button type="button" class="view-map-btn" id="viewMapBtn">View Safety Map</button>
      </div>
    </section>

    <section class="alerts-card" aria-label="Alerts list">
      <div class="alerts-list" id="alertsList"></div>
    </section>
  </main>

  <script src="js/alerts.js" defer></script>
</body>
</html>
