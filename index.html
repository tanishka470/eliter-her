<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Nest - Login / Signup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #f3f6f9;
      --surface: #ffffff;
      --primary: #0f766e;
      --primary-strong: #0a5f58;
      --accent: #f59e0b;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dce3ea;
      --danger: #dc2626;
      --success: #059669;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 85% 10%, rgba(15, 118, 110, 0.2), transparent 35%),
        radial-gradient(circle at 10% 90%, rgba(245, 158, 11, 0.15), transparent 30%),
        var(--bg);
      display: flex;
      flex-direction: column;
    }

    header {
      width: min(1100px, 92%);
      margin: 28px auto 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      animation: fadeDown 0.55s ease;
    }

    .brand h1 {
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.5px;
      color: var(--primary-strong);
    }

    .brand p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    select,
    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .theme-toggle {
      font-weight: 600;
      color: var(--primary-strong);
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 24px 0 36px;
    }

    .auth-card {
      width: min(460px, 92%);
      background: var(--surface);
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: riseUp 0.55s ease;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
      background: #f8fbfc;
    }

    .auth-tab {
      border: none;
      padding: 14px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: 0.25s ease;
    }

    .auth-tab.active {
      color: var(--primary-strong);
      background: #e6f7f5;
    }

    .form-wrap {
      padding: 24px;
    }

    form {
      display: none;
      gap: 12px;
    }

    form.active {
      display: grid;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }

    .field input {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    .error {
      min-height: 18px;
      font-size: 12px;
      color: var(--danger);
    }

    .submit-btn {
      margin-top: 2px;
      border: none;
      background: linear-gradient(120deg, var(--primary), #0ea5a2);
      color: #ffffff;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.3);
    }

    .form-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: -2px;
      font-size: 13px;
    }

    .form-links a {
      color: #0369a1;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .form-links a:hover {
      text-decoration: underline;
    }

    .status-msg {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 600;
      min-height: 20px;
      color: var(--success);
    }

    .status-msg.error-text {
      color: var(--danger);
    }

    .hidden {
      display: none;
    }

    body.dark {
      --bg: #0b1220;
      --surface: #111b2f;
      --text: #f1f5f9;
      --muted: #a5b4c8;
      --border: #23324f;
      --shadow: 0 24px 50px rgba(2, 6, 23, 0.5);
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes riseUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      header {
        flex-direction: column;
      }

      .header-controls {
        width: 100%;
      }

      .header-controls select,
      .header-controls .theme-toggle {
        flex: 1;
      }

      .form-links {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Safe Nest</h1>
      <p>A platform for safer navigation</p>
    </div>

    <div class="header-controls">
      <select aria-label="Select language">
        <option>English</option>
        <option>Hindi</option>
      </select>
      <button class="theme-toggle" id="themeToggle" type="button">Toggle Theme</button>
    </div>
  </header>

  <main>
    <section class="auth-card" aria-label="Authentication">
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" type="button">Login</button>
        <button class="auth-tab" id="signupTab" type="button">Sign Up</button>
      </div>

      <div class="form-wrap">
        <form id="loginForm" class="active" novalidate>
          <div class="field">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" placeholder="Enter your email" />
          </div>
          <div class="field">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="Enter your password" />
          </div>
          <p class="error" id="loginError"></p>
          <button class="submit-btn" type="submit">Login</button>
          <div class="form-links">
            <a href="#" id="forgotPasswordLink">Forgot Password?</a>
            <a href="#" id="createAccountLink">Create New Account</a>
          </div>
          <p class="status-msg" id="loginStatus"></p>
        </form>

        <form id="signupForm" novalidate>
          <div class="field">
            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" placeholder="Enter your full name" />
          </div>
          <div class="field">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" type="email" placeholder="Enter your email" />
          </div>
          <div class="field">
            <label for="phoneNumber">Phone Number</label>
            <input id="phoneNumber" type="tel" placeholder="Enter 10-digit phone number" />
          </div>
          <div class="field">
            <label for="signupPassword">Password</label>
            <input id="signupPassword" type="password" placeholder="Create a password" />
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" placeholder="Confirm your password" />
          </div>
          <p class="error" id="signupError"></p>
          <button class="submit-btn" type="submit">Sign Up</button>
          <p class="status-msg" id="signupStatus"></p>
        </form>
      </div>
    </section>
  </main>

  <script>
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    const loginError = document.getElementById('loginError');
    const signupError = document.getElementById('signupError');
    const loginStatus = document.getElementById('loginStatus');
    const signupStatus = document.getElementById('signupStatus');

    const createAccountLink = document.getElementById('createAccountLink');
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    const themeToggle = document.getElementById('themeToggle');

    function switchForm(formType) {
      const isLogin = formType === 'login';
      loginTab.classList.toggle('active', isLogin);
      signupTab.classList.toggle('active', !isLogin);
      loginForm.classList.toggle('active', isLogin);
      signupForm.classList.toggle('active', !isLogin);
      clearMessages();
    }

    function clearMessages() {
      loginError.textContent = '';
      signupError.textContent = '';
      loginStatus.textContent = '';
      signupStatus.textContent = '';
      loginStatus.classList.remove('error-text');
      signupStatus.classList.remove('error-text');
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validateSignupInput(data) {
      if (!data.fullName || data.fullName.length < 3) {
        return 'Full Name must be at least 3 characters.';
      }
      if (!isValidEmail(data.email)) {
        return 'Please enter a valid email address.';
      }
      if (!/^\d{10}$/.test(data.phoneNumber)) {
        return 'Phone Number must be exactly 10 digits.';
      }
      if (data.password.length < 6) {
        return 'Password must be at least 6 characters.';
      }
      if (data.password !== data.confirmPassword) {
        return 'Password and Confirm Password must match.';
      }
      return '';
    }

    function getUsers() {
      const stored = localStorage.getItem('safeNestUsers');
      return stored ? JSON.parse(stored) : [];
    }

    function saveUsers(users) {
      localStorage.setItem('safeNestUsers', JSON.stringify(users));
    }

    loginTab.addEventListener('click', function () {
      switchForm('login');
    });

    signupTab.addEventListener('click', function () {
      switchForm('signup');
    });

    createAccountLink.addEventListener('click', function (event) {
      event.preventDefault();
      switchForm('signup');
    });

    forgotPasswordLink.addEventListener('click', function (event) {
      event.preventDefault();
      loginStatus.textContent = 'Password reset flow will be added later.';
      loginStatus.classList.remove('error-text');
    });

    signupForm.addEventListener('submit', function (event) {
      event.preventDefault();
      clearMessages();

      const signupData = {
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('signupEmail').value.trim().toLowerCase(),
        phoneNumber: document.getElementById('phoneNumber').value.trim(),
        password: document.getElementById('signupPassword').value,
        confirmPassword: document.getElementById('confirmPassword').value
      };

      const validationError = validateSignupInput(signupData);
      if (validationError) {
        signupError.textContent = validationError;
        return;
      }

      const users = getUsers();
      const existingUser = users.find(function (user) {
        return user.email === signupData.email;
      });

      if (existingUser) {
        signupError.textContent = 'Account already exists with this email.';
        return;
      }

      users.push({
        fullName: signupData.fullName,
        email: signupData.email,
        phoneNumber: signupData.phoneNumber,
        password: signupData.password
      });

      saveUsers(users);
      signupStatus.textContent = 'Sign up successful. You can now login.';
      signupForm.reset();
      switchForm('login');
    });

    loginForm.addEventListener('submit', function (event) {
      event.preventDefault();
      clearMessages();

      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;

      if (!isValidEmail(email)) {
        loginError.textContent = 'Please enter a valid email address.';
        return;
      }

      if (!password) {
        loginError.textContent = 'Please enter your password.';
        return;
      }

      const users = getUsers();
      const matchedUser = users.find(function (user) {
        return user.email === email && user.password === password;
      });

      if (!matchedUser) {
        loginStatus.textContent = 'Invalid email or password.';
        loginStatus.classList.add('error-text');
        return;
      }

      loginStatus.textContent = 'Login successful. Welcome, ' + matchedUser.fullName + '!';
      localStorage.setItem('safeNestCurrentUser', JSON.stringify(matchedUser));
      loginForm.reset();
      window.location.href = 'dashboard.html';
    });

    themeToggle.addEventListener('click', function () {
      document.body.classList.toggle('dark');
    });
  </script>
</body>
</html>
