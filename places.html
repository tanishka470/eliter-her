<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Nest - Women-Friendly Places</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #f3f7fb;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f766e;
      --primary-strong: #0b5f59;
      --secondary: #0ea5a2;
      --border: #d9e3ec;
      --danger: #dc2626;
      --success: #16a34a;
      --warn: #f59e0b;
      --shadow: 0 16px 35px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 12%, rgba(14, 165, 162, 0.16), transparent 35%),
        radial-gradient(circle at 92% 82%, rgba(245, 158, 11, 0.14), transparent 28%),
        var(--bg);
      padding: 18px 16px 20px;
    }

    .top-bar {
      width: min(1200px, 100%);
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
      position: sticky;
      top: 10px;
      z-index: 1000;
      animation: fadeDown 0.45s ease;
    }

    .back-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #334155;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary-strong);
      letter-spacing: -0.3px;
    }

    .emergency-btn {
      border: none;
      background: linear-gradient(120deg, #ef4444, #dc2626);
      color: #fff;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 9px 14px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(220, 38, 38, 0.25);
      white-space: nowrap;
    }

    .container {
      width: min(1200px, 100%);
      margin: 0 auto;
    }

    .search-filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
      animation: riseUp 0.45s ease;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
    }

    .search-box input::placeholder {
      color: var(--muted);
    }

    .search-icon {
      color: var(--muted);
      font-size: 16px;
    }

    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .filter-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      align-self: center;
    }

    .filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--border);
      background: #fff;
      color: #334155;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .chip:hover {
      border-color: var(--primary);
    }

    .places-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .place-card {
      background: var(--surface);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: riseUp 0.45s ease;
    }

    .place-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.15);
    }

    .place-header {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .place-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary-strong);
      margin-bottom: 4px;
    }

    .place-location {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .stars {
      color: var(--warn);;
      letter-spacing: 0.5px;
    }

    .rating-num {
      font-weight: 600;
      color: #334155;
    }

    .place-body {
      padding: 14px;
    }

    .feature-list {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #334155;
      font-weight: 500;
    }

    .feature-check {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: #dcfce7;
      color: #166534;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .add-review-btn {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--primary);
      border-radius: 10px;
      padding: 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .add-review-btn:hover {
      background: #f8fbfc;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      place-items: center;
      padding: 16px;
    }

    .modal.show {
      display: grid;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 20px;
      max-width: 460px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: riseUp 0.3s ease;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-strong);
    }

    .close-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 12px;
      font-weight: 600;
      color: #334155;
    }

    .field input,
    .field textarea {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: 0.2s ease;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    .field textarea {
      resize: vertical;
      min-height: 80px;
    }

    .star-picker {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .star-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .star-btn.selected {
      background: #fef3c7;
      border-color: var(--warn);
    }

    .submit-review-btn {
      width: 100%;
      border: none;
      background: linear-gradient(120deg, var(--primary), var(--secondary));
      color: #fff;
      border-radius: 10px;
      padding: 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 12px;
    }

    .submit-review-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.3);
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .search-filter-row {
        grid-template-columns: 1fr;
      }

      .places-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        max-width: 100%;
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes riseUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <button class="back-btn" type="button" id="backBtn">Back</button>
    <h1 class="page-title">Women-Friendly Places</h1>
    <button class="emergency-btn" type="button" id="emergencyBtn">Emergency</button>
  </header>

  <div class="container">
    <div class="search-filter-row">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="searchInput" type="text" placeholder="Search places by name..." />
      </div>

      <div class="filter-group">
        <span class="filter-label">Category:</span>
        <div class="filter-chips">
          <button class="chip active" data-category="all">All</button>
          <button class="chip" data-category="clothing">Clothing Stores</button>
          <button class="chip" data-category="cafes">Cafes</button>
          <button class="chip" data-category="gyms">Gyms</button>
          <button class="chip" data-category="hospitals">Hospitals</button>
          <button class="chip" data-category="hostels">Hostels</button>
        </div>
      </div>
    </div>

    <section class="places-grid" id="placesGrid"></section>
  </div>

  <div class="modal" id="reviewModal">
    <div class="modal-content">
      <div class="modal-head">
        <h2 class="modal-title" id="modalPlaceName">Add Review</h2>
        <button class="close-btn" type="button" id="closeModalBtn">&times;</button>
      </div>

      <form id="reviewForm" novalidate>
        <div class="field">
          <label>Rating</label>
          <div class="star-picker" id="starPicker"></div>
        </div>

        <div class="field">
          <label for="reviewComment">Your Review</label>
          <textarea id="reviewComment" placeholder="Share your experience..."></textarea>
        </div>

        <button class="submit-review-btn" type="submit">Submit Review</button>
      </form>
    </div>
  </div>

  <script>
    const placesData = [
      {
        id: 1,
        name: 'Pantaloons Fashion',
        location: 'Connaught Place, New Delhi',
        category: 'clothing',
        rating: 4.5,
        reviews: 24,
        features: { femaleStaff: true, washrooms: true, lighting: true, changingRooms: true, security: true }
      },
      {
        id: 2,
        name: 'The Brew Company',
        location: 'MG Road, Bengaluru',
        category: 'cafes',
        rating: 4.3,
        reviews: 18,
        features: { femaleStaff: true, washrooms: true, lighting: true, changingRooms: false, security: true }
      },
      {
        id: 3,
        name: 'FitActive Gym',
        location: 'Sector 18, Noida',
        category: 'gyms',
        rating: 4.7,
        reviews: 31,
        features: { femaleStaff: true, washrooms: true, lighting: true, changingRooms: true, security: true }
      },
      {
        id: 4,
        name: 'Apollo Hospital',
        location: 'Bandra, Mumbai',
        category: 'hospitals',
        rating: 4.6,
        reviews: 52,
        features: { femaleStaff: true, washrooms: true, lighting: true, changingRooms: false, security: true }
      },
      {
        id: 5,
        name: 'Restora Cafe',
        location: 'Indiranagar, Bengaluru',
        category: 'cafes',
        rating: 4.2,
        reviews: 15,
        features: { femaleStaff: true, washrooms: true, lighting: true, changingRooms: false, security: true }
      },
      {
        id: 6,
        name: 'SafeStay Hostel',
        location: 'Paharganj, New Delhi',
        category: 'hostels',
        rating: 4.1,
        reviews: 27,
        features: { femaleStaff: true, washrooms: true, lighting: true, changingRooms: true, security: true }
      },
      {
        id: 7,
        name: 'Zara Store',
        location: 'DLF Mall, Gurgaon',
        category: 'clothing',
        rating: 4.4,
        reviews: 22,
        features: { femaleStaff: true, washrooms: true, lighting: true, changingRooms: true, security: true }
      },
      {
        id: 8,
        name: 'Yoga Hub Studio',
        location: 'Koramangala, Bengaluru',
        category: 'gyms',
        rating: 4.8,
        reviews: 41,
        features: { femaleStaff: true, washrooms: true, lighting: true, changingRooms: true, security: true }
      }
    ];

    let selectedCategory = 'all';
    let selectedPlaceId = null;
    let selectedRating = 0;

    const placesGrid = document.getElementById('placesGrid');
    const searchInput = document.getElementById('searchInput');
    const reviewModal = document.getElementById('reviewModal');
    const reviewForm = document.getElementById('reviewForm');
    const starPicker = document.getElementById('starPicker');
    const modalPlaceName = document.getElementById('modalPlaceName');
    const reviewComment = document.getElementById('reviewComment');

    function renderStarPicker() {
      starPicker.innerHTML = '';
      for (let i = 1; i <= 5; i += 1) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'star-btn';
        btn.textContent = '★';
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          selectedRating = i;
          updateStarPicker();
        });
        starPicker.appendChild(btn);
      }
    }

    function updateStarPicker() {
      const btns = starPicker.querySelectorAll('.star-btn');
      btns.forEach(function (btn, index) {
        btn.classList.toggle('selected', index < selectedRating);
      });
    }

    function getReviews(placeId) {
      const stored = localStorage.getItem('safeNestPlaceReviews');
      const allReviews = stored ? JSON.parse(stored) : {};
      return allReviews[placeId] || [];
    }

    function saveReview(placeId, review) {
      const stored = localStorage.getItem('safeNestPlaceReviews');
      const allReviews = stored ? JSON.parse(stored) : {};
      if (!allReviews[placeId]) {
        allReviews[placeId] = [];
      }
      allReviews[placeId].push(review);
      localStorage.setItem('safeNestPlaceReviews', JSON.stringify(allReviews));
    }

    function renderPlaces() {
      placesGrid.innerHTML = '';
      const query = searchInput.value.toLowerCase();
      const filtered = placesData.filter(function (place) {
        const matchesCategory = selectedCategory === 'all' || place.category === selectedCategory;
        const matchesSearch = place.name.toLowerCase().includes(query) || place.location.toLowerCase().includes(query);
        return matchesCategory && matchesSearch;
      });

      if (filtered.length === 0) {
        placesGrid.innerHTML = '<div class="no-results">No places found matching your search and filters.</div>';
        return;
      }

      filtered.forEach(function (place) {
        const card = document.createElement('div');
        card.className = 'place-card';

        const starStr = '★'.repeat(Math.floor(place.rating)) + (place.rating % 1 >= 0.5 ? '☆' : '');
        const featureCount = Object.values(place.features).filter(Boolean).length;

        card.innerHTML =
          '<div class="place-header">' +
            '<div class="place-name">' + place.name + '</div>' +
            '<div class="place-location">📍 ' + place.location + '</div>' +
            '<div class="rating-row">' +
              '<span class="stars">' + starStr + '</span>' +
              '<span class="rating-num">' + place.rating + '</span>' +
              '<span style="font-size: 11px; color: var(--muted);">(' + place.reviews + ' reviews)</span>' +
            '</div>' +
          '</div>' +
          '<div class="place-body">' +
            '<div class="feature-list">' +
              (place.features.femaleStaff ? '<div class="feature-item"><div class="feature-check">✓</div>Female Staff</div>' : '') +
              (place.features.washrooms ? '<div class="feature-item"><div class="feature-check">✓</div>Clean Washrooms</div>' : '') +
              (place.features.lighting ? '<div class="feature-item"><div class="feature-check">✓</div>Good Lighting</div>' : '') +
              (place.features.changingRooms ? '<div class="feature-item"><div class="feature-check">✓</div>Changing Rooms</div>' : '') +
              (place.features.security ? '<div class="feature-item"><div class="feature-check">✓</div>Security Presence</div>' : '') +
            '</div>' +
            '<button class="add-review-btn" type="button">Add Review</button>' +
          '</div>';

        card.querySelector('.add-review-btn').addEventListener('click', function () {
          selectedPlaceId = place.id;
          selectedRating = 0;
          modalPlaceName.textContent = 'Review - ' + place.name;
          reviewComment.value = '';
          updateStarPicker();
          reviewModal.classList.add('show');
        });

        placesGrid.appendChild(card);
      });
    }

    document.querySelectorAll('.chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        document.querySelectorAll('.chip').forEach(function (c) {
          c.classList.remove('active');
        });
        chip.classList.add('active');
        selectedCategory = chip.dataset.category;
        renderPlaces();
      });
    });

    searchInput.addEventListener('input', renderPlaces);

    document.getElementById('closeModalBtn').addEventListener('click', function () {
      reviewModal.classList.remove('show');
    });

    reviewForm.addEventListener('submit', function (e) {
      e.preventDefault();

      if (!selectedRating) {
        alert('Please select a rating.');
        return;
      }

      const comment = reviewComment.value.trim();
      if (!comment) {
        alert('Please write a review.');
        return;
      }

      const review = {
        rating: selectedRating,
        comment: comment,
        date: new Date().toISOString()
      };

      saveReview(selectedPlaceId, review);
      reviewModal.classList.remove('show');
      alert('Review added successfully!');
      renderPlaces();
    });

    document.getElementById('backBtn').addEventListener('click', function () {
      window.location.href = 'dashboard.html';
    });

    document.getElementById('emergencyBtn').addEventListener('click', function () {
      window.location.href = 'tel:112';
    });

    renderStarPicker();
    renderPlaces();
  </script>
</body>
</html>
