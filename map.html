<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Nest - Safety Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/map.css" /></head>
<body>
  <button class="emergency-btn" type="button" id="emergencyBtn">Emergency</button>

  <header class="top-bar">
    <div class="top-left">
      <button class="back-btn" type="button" id="backBtn">Back</button>
      <div class="location-chip" id="locationDisplay">Loading location...</div>
    </div>
  </header>

  <main class="main-layout">
    <section class="map-card">
      <div class="map-head">
        <h1 class="map-title">Safety Map</h1>
        <div class="zone-legend">
          <span><span class="dot" style="background:#dc2626"></span>Red: Unsafe</span>
          <span><span class="dot" style="background:#f59e0b"></span>Yellow: Moderate</span>
          <span><span class="dot" style="background:#16a34a"></span>Green: Safe</span>
        </div>
      </div>
      <div id="map" aria-label="Map view"></div>
    </section>

    <aside class="panel-card">
      <div class="panel-content">
        <h2 class="panel-title">Safety Indicators</h2>
        <div class="indicator-grid" id="indicatorGrid"></div>

        <section class="score-box">
          <div class="score-head">
            <span class="score-label">Safety Score</span>
            <span class="score-value" id="scoreValue">0.0 / 10</span>
          </div>
          <div class="score-track">
            <div class="score-fill" id="scoreFill"></div>
          </div>
          <div class="score-stars" id="scoreStars">â˜†â˜†â˜†â˜†â˜†</div>
          <p class="score-note" id="scoreNote">Waiting for location data...</p>
        </section>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/map.js" defer></script>
</body>
</html>
