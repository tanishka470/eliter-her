<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Nest - Safety Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #f3f7fb;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f766e;
      --primary-strong: #0b5f59;
      --secondary: #0ea5a2;
      --border: #d9e3ec;
      --danger: #dc2626;
      --warn: #f59e0b;
      --safe: #16a34a;
      --shadow: 0 16px 35px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 12%, rgba(14, 165, 162, 0.16), transparent 35%),
        radial-gradient(circle at 92% 82%, rgba(245, 158, 11, 0.14), transparent 28%),
        var(--bg);
      padding: 18px 16px 20px;
    }

    .top-bar {
      width: min(1200px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
      position: sticky;
      top: 10px;
      z-index: 1000;
      animation: fadeDown 0.45s ease;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .back-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #334155;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .location-chip {
      background: #e9fbf8;
      color: var(--primary-strong);
      border: 1px solid rgba(15, 118, 110, 0.2);
      border-radius: 999px;
      font-size: 13px;
      padding: 8px 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70vw;
    }

    .emergency-btn {
      position: fixed;
      right: 18px;
      top: 18px;
      border: none;
      background: linear-gradient(120deg, #ef4444, #dc2626);
      color: #fff;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 10px 14px;
      cursor: pointer;
      box-shadow: 0 12px 25px rgba(220, 38, 38, 0.3);
      z-index: 1200;
    }

    .main-layout {
      width: min(1200px, 100%);
      margin: 16px auto 0;
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 14px;
      animation: riseUp 0.45s ease;
    }

    .map-card,
    .panel-card {
      background: var(--surface);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .map-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .map-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-strong);
    }

    .zone-legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    #map {
      width: 100%;
      height: 72vh;
      min-height: 460px;
    }

    .panel-content {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-strong);
    }

    .indicator-grid {
      display: grid;
      gap: 8px;
    }

    .indicator-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: #f9fcfd;
    }

    .indicator-item span:first-child {
      font-size: 12px;
      color: #334155;
      font-weight: 600;
    }

    .indicator-value {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .value-good {
      background: #dcfce7;
      color: #166534;
    }

    .value-mid {
      background: #fef3c7;
      color: #92400e;
    }

    .value-bad {
      background: #fee2e2;
      color: #991b1b;
    }

    .score-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: linear-gradient(145deg, #f0fdfb, #ffffff);
      display: grid;
      gap: 8px;
    }

    .score-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .score-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .score-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary-strong);
    }

    .score-track {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #16a34a);
      transition: width 0.4s ease;
    }

    .score-stars {
      font-size: 18px;
      letter-spacing: 1px;
      color: #f59e0b;
    }

    .score-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      #map {
        height: 54vh;
        min-height: 380px;
      }

      .emergency-btn {
        top: auto;
        bottom: 16px;
      }
    }

    @media (max-width: 620px) {
      .top-bar {
        padding-right: 66px;
      }

      .location-chip {
        max-width: 54vw;
      }

      .emergency-btn {
        right: 12px;
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes riseUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <button class="emergency-btn" type="button" id="emergencyBtn">Emergency</button>

  <header class="top-bar">
    <div class="top-left">
      <button class="back-btn" type="button" id="backBtn">Back</button>
      <div class="location-chip" id="locationDisplay">Loading location...</div>
    </div>
  </header>

  <main class="main-layout">
    <section class="map-card">
      <div class="map-head">
        <h1 class="map-title">Safety Map</h1>
        <div class="zone-legend">
          <span><span class="dot" style="background:#dc2626"></span>Red: Unsafe</span>
          <span><span class="dot" style="background:#f59e0b"></span>Yellow: Moderate</span>
          <span><span class="dot" style="background:#16a34a"></span>Green: Safe</span>
        </div>
      </div>
      <div id="map" aria-label="Map view"></div>
    </section>

    <aside class="panel-card">
      <div class="panel-content">
        <h2 class="panel-title">Safety Indicators</h2>
        <div class="indicator-grid" id="indicatorGrid"></div>

        <section class="score-box">
          <div class="score-head">
            <span class="score-label">Safety Score</span>
            <span class="score-value" id="scoreValue">0.0 / 10</span>
          </div>
          <div class="score-track">
            <div class="score-fill" id="scoreFill"></div>
          </div>
          <div class="score-stars" id="scoreStars">☆☆☆☆☆</div>
          <p class="score-note" id="scoreNote">Waiting for location data...</p>
        </section>
      </div>
    </aside>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const locationDisplay = document.getElementById('locationDisplay');
    const indicatorGrid = document.getElementById('indicatorGrid');
    const scoreValue = document.getElementById('scoreValue');
    const scoreFill = document.getElementById('scoreFill');
    const scoreStars = document.getElementById('scoreStars');
    const scoreNote = document.getElementById('scoreNote');

    const locationCoordinates = {
      'new delhi': [28.6139, 77.209],
      'mumbai': [19.076, 72.8777],
      'bengaluru': [12.9716, 77.5946],
      'lucknow': [26.8467, 80.9462],
      'chennai': [13.0827, 80.2707],
      default: [20.5937, 78.9629]
    };

    const severityWeight = {
      good: 1,
      moderate: 0.6,
      poor: 0.2
    };

    function getSavedLocation() {
      const raw = localStorage.getItem('safeNestSelectedLocation');
      return raw ? JSON.parse(raw) : null;
    }

    function cityToCoordinates(city) {
      if (!city) {
        return locationCoordinates.default;
      }
      const key = city.trim().toLowerCase();
      return locationCoordinates[key] || locationCoordinates.default;
    }

    function generateSafetyData(location) {
      const seedText = (location.area + location.city + location.state).toLowerCase();
      let seed = 0;
      for (let i = 0; i < seedText.length; i += 1) {
        seed += seedText.charCodeAt(i) * (i + 1);
      }

      const pick = function (items, multiplier) {
        const index = (seed * multiplier) % items.length;
        return items[index];
      };

      const data = {
        'Street Lighting': pick(['Good', 'Moderate', 'Poor'], 3),
        'Public Washrooms': pick(['Available', 'Not Available'], 5),
        'Alcohol Shops Nearby': pick(['Low', 'Medium', 'High'], 7),
        'Police Presence': pick(['Frequent', 'Occasional', 'Rare'], 11),
        'Crowd Density': pick(['High', 'Medium', 'Low'], 13),
        'CCTV Availability': pick(['Yes', 'No'], 17),
        'Transport Availability': pick(['Good', 'Limited'], 19),
        'Network Connectivity': pick(['Strong', 'Weak'], 23)
      };

      return data;
    }

    function indicatorToWeight(label, value) {
      const positiveMap = {
        'Street Lighting': { Good: severityWeight.good, Moderate: severityWeight.moderate, Poor: severityWeight.poor },
        'Public Washrooms': { Available: severityWeight.good, 'Not Available': severityWeight.poor },
        'Police Presence': { Frequent: severityWeight.good, Occasional: severityWeight.moderate, Rare: severityWeight.poor },
        'CCTV Availability': { Yes: severityWeight.good, No: severityWeight.poor },
        'Transport Availability': { Good: severityWeight.good, Limited: severityWeight.poor },
        'Network Connectivity': { Strong: severityWeight.good, Weak: severityWeight.poor },
        'Crowd Density': { High: severityWeight.good, Medium: severityWeight.moderate, Low: severityWeight.poor },
        'Alcohol Shops Nearby': { Low: severityWeight.good, Medium: severityWeight.moderate, High: severityWeight.poor }
      };

      return positiveMap[label][value];
    }

    function valueClass(label, value) {
      const weight = indicatorToWeight(label, value);
      if (weight >= 0.8) {
        return 'value-good';
      }
      if (weight >= 0.5) {
        return 'value-mid';
      }
      return 'value-bad';
    }

    function renderIndicators(indicators) {
      indicatorGrid.innerHTML = '';
      const entries = Object.entries(indicators);
      entries.forEach(function (entry) {
        const label = entry[0];
        const value = entry[1];
        const row = document.createElement('div');
        row.className = 'indicator-item';
        row.innerHTML =
          '<span>' + label + '</span>' +
          '<span class="indicator-value ' + valueClass(label, value) + '">' + value + '</span>';
        indicatorGrid.appendChild(row);
      });
    }

    function computeScore(indicators) {
      const entries = Object.entries(indicators);
      let sum = 0;
      entries.forEach(function (entry) {
        sum += indicatorToWeight(entry[0], entry[1]);
      });
      const scoreOutOfTen = (sum / entries.length) * 10;
      return Number(scoreOutOfTen.toFixed(1));
    }

    function scoreRemark(score) {
      if (score >= 7.5) {
        return 'This area is generally safe. Continue standard precautions.';
      }
      if (score >= 5) {
        return 'This area is moderately safe. Stay alert, especially after dark.';
      }
      return 'This area has elevated risk markers. Prefer safer alternatives if possible.';
    }

    function scoreToStars(score) {
      const filled = Math.max(0, Math.min(5, Math.round(score / 2)));
      return '★'.repeat(filled) + '☆'.repeat(5 - filled);
    }

    function addZoneOverlays(map, center) {
      const unsafeZone = [center[0] + 0.008, center[1] - 0.012];
      const moderateZone = [center[0] - 0.006, center[1] + 0.011];
      const safeZone = [center[0] + 0.004, center[1] + 0.008];

      L.circle(unsafeZone, {
        color: '#dc2626',
        fillColor: '#ef4444',
        fillOpacity: 0.35,
        radius: 550
      }).addTo(map).bindPopup('Unsafe Zone (Red)');

      L.circle(moderateZone, {
        color: '#d97706',
        fillColor: '#f59e0b',
        fillOpacity: 0.35,
        radius: 520
      }).addTo(map).bindPopup('Moderate Zone (Yellow)');

      L.circle(safeZone, {
        color: '#15803d',
        fillColor: '#22c55e',
        fillOpacity: 0.3,
        radius: 600
      }).addTo(map).bindPopup('Safe Zone (Green)');
    }

    function getFocusMode() {
      const params = new URLSearchParams(window.location.search);
      return params.get('focus') || '';
    }

    function initPage() {
      const location = getSavedLocation();
      const focusMode = getFocusMode();

      if (!location) {
        locationDisplay.textContent = 'No location selected - please choose from dashboard';
        scoreNote.textContent = 'Location missing. Redirecting to dashboard...';
        setTimeout(function () {
          window.location.href = 'dashboard.html';
        }, 1200);
        return;
      }

      const formattedLocation = location.city + ', ' + location.area;
      locationDisplay.textContent = formattedLocation;

      const center = cityToCoordinates(location.city);

      const map = L.map('map').setView(center, 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      L.marker(center).addTo(map).bindPopup('Selected Location: ' + location.area).openPopup();
      addZoneOverlays(map, center);

      const indicators = generateSafetyData(location);
      renderIndicators(indicators);

      const score = computeScore(indicators);
      scoreValue.textContent = score.toFixed(1) + ' / 10';
      scoreFill.style.width = String(score * 10) + '%';
      scoreStars.textContent = scoreToStars(score);
      scoreNote.textContent = scoreRemark(score);

      if (focusMode === 'women-friendly') {
        scoreNote.textContent = 'Focused on women-friendly places near your selected area.';
      } else if (focusMode === 'alerts') {
        scoreNote.textContent = 'Showing location context for live alerts and safety monitoring.';
      }
    }

    document.getElementById('backBtn').addEventListener('click', function () {
      window.location.href = 'dashboard.html';
    });

    document.getElementById('emergencyBtn').addEventListener('click', function () {
      window.location.href = 'tel:112';
    });

    initPage();
  </script>
</body>
</html>
