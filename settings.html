<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Nest - Settings</title>
  <link rel="stylesheet" href="css/settings.css" />
</head>
<body>
  <header class="top-bar">
    <button class="back-btn" type="button" id="backBtn">Back</button>
    <h1 class="page-title">Settings</h1>
    <button class="emergency-btn" type="button" id="emergencyBtn">Emergency</button>
  </header>

  <main class="settings-container">
    <!-- Profile Settings -->
    <section class="settings-section">
      <h2>Profile Settings</h2>
      <form id="profileForm" novalidate>
        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" type="text" placeholder="Enter your name" />
        </div>
        <div class="field">
          <label for="phone">Phone Number</label>
          <input id="phone" type="tel" placeholder="Enter phone number" />
        </div>
        <div class="field">
          <label for="password">Change Password</label>
          <input id="password" type="password" placeholder="New password" />
        </div>
        <button class="save-btn" type="submit">Save Profile</button>
      </form>
    </section>

    <!-- Theme Settings -->
    <section class="settings-section">
      <h2>Theme Settings</h2>
      <label class="toggle">
        <input type="checkbox" id="themeToggle" />
        <span class="slider"></span>
        <span class="toggle-label">Dark Mode</span>
      </label>
    </section>

    <!-- Language Settings -->
    <section class="settings-section">
      <h2>Language Settings</h2>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
      </select>
    </section>

    <!-- Privacy Settings -->
    <section class="settings-section">
      <h2>Privacy Settings</h2>
      <label class="toggle">
        <input type="checkbox" id="locationToggle" />
        <span class="slider"></span>
        <span class="toggle-label">Location Tracking</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="dataToggle" />
        <span class="slider"></span>
        <span class="toggle-label">Data Sharing</span>
      </label>
    </section>
  </main>

  <script src="js/settings.js" defer></script>
</body>
</html>
